name: Deploy Backend (Render)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - '.github/workflows/deploy-backend.yml'

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate imports
        run: |
          python -c "
          from backend.main import app
          from backend.agents import run_article_pipeline
          from backend.providers import get_available_provider
          from backend.prompt_adapter import validate_options
          print('✓ All backend imports valid')
          "

      - name: Trigger Render deploy
        if: github.ref == 'refs/heads/main'
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✓ Render deploy triggered"
